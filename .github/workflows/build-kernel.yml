# GitHub Actions 工作流：云端编译 OnePlus Turbo 6 主线内核
#
# 时间：2026-06-21
# 目标内核：Linux 7.1.1（最新稳定版）
# 策略：从 ACK 6.6.89 (OnePlusOSS) 拉取 SM8735 sun 驱动并适配主线
#
# 工作流流程：
#   1. 下载主线 Linux 内核源码
#   2. 应用自定义 DTS 文件
#   3. 从 OnePlusOSS ACK 仓库拉取 sun 驱动（gcc-sun, pinctrl-sun 等）
#   4. 将 sun 驱动源码放入主线内核树并添加 Kconfig/Makefile 条目
#   5. 配置内核（ARM64 defconfig + Qualcomm 驱动）
#   6. 编译 DTB 和内核 Image
#   7. 上传编译产物
#
# 由于本地资源有限（ARM64 Debian 容器，2.4G 可用内存），
# 内核编译通过 GitHub 云端 CI 完成。

name: Build Mainline Kernel

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dts/**'
      - '.github/workflows/build-kernel.yml'
      - 'config/**'
      - 'patches/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Linux 内核版本 (git tag)'
        required: true
        default: 'v7.1'
        type: choice
        options:
          - v7.1
          - v7.0
          - v6.18
          - v6.13

jobs:
  compile-kernel:
    name: "Linux ${{ inputs.kernel_version || 'v7.1' }}"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout kernel repo (DTS + config + patches)
        uses: actions/checkout@v4
        with:
          path: kernel-repo

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            device-tree-compiler \
            flex bison \
            libssl-dev \
            libncurses-dev \
            bc cpio \
            kmod \
            lz4 \
            python3

      - name: Determine kernel tag
        id: kernel-tag
        run: |
          TAG="${{ inputs.kernel_version || 'v7.1' }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Kernel tag: ${TAG}"

      - name: Cache kernel source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: linux-src
          key: linux-${{ steps.kernel-tag.outputs.tag }}

      - name: Download kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ steps.kernel-tag.outputs.tag }} \
            https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git \
            linux-src

      - name: Apply device tree files
        run: |
          cp kernel-repo/dts/sm8735.dtsi linux-src/arch/arm64/boot/dts/qcom/
          cp kernel-repo/dts/sm8735-oneplus-turbo6.dts linux-src/arch/arm64/boot/dts/qcom/

          # 添加 DTB 到 Makefile（如果还没有）
          if ! grep -q "sm8735-oneplus-turbo6" \
            linux-src/arch/arm64/boot/dts/qcom/Makefile; then
            echo "dtb-\$(CONFIG_ARCH_QCOM) += sm8735-oneplus-turbo6.dtb" \
              >> linux-src/arch/arm64/boot/dts/qcom/Makefile
            echo "✅ Added sm8735 DTB to Makefile"
          else
            echo "✅ sm8735 DTB already in Makefile"
          fi

      - name: Check SM8735/sun driver support in target kernel
        id: check-drivers
        run: |
          set +e
          echo "=== 检查 ${{ steps.kernel-tag.outputs.tag }} 中的 SM8735/sun 驱动支持 ==="
          
          echo "--- GCC 驱动 ---"
          FOUND_GCC=$(grep -rl "sun-gcc\|sm8735" linux-src/drivers/clk/qcom/ 2>/dev/null)
          if [ -n "$FOUND_GCC" ]; then
            echo "✅ 找到 sun GCC 驱动: $FOUND_GCC"
            echo "sun_gcc_found=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到 sun GCC 驱动"
            echo "sun_gcc_found=false" >> $GITHUB_OUTPUT
          fi
          
          echo "--- TLMM 驱动 ---"
          FOUND_TLMM=$(grep -rl "sun-tlmm\|sm8735" linux-src/drivers/pinctrl/qcom/ 2>/dev/null)
          if [ -n "$FOUND_TLMM" ]; then
            echo "✅ 找到 sun TLMM 驱动: $FOUND_TLMM"
            echo "sun_tlmm_found=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到 sun TLMM 驱动"
            echo "sun_tlmm_found=false" >> $GITHUB_OUTPUT
          fi
          
          echo "--- PDC 驱动 ---"
          # qcom,pdc 是通用 fallback，检查是否支持
          FOUND_PDC=$(grep -rl "sun-pdc" linux-src/drivers/irqchip/ 2>/dev/null)
          if [ -n "$FOUND_PDC" ]; then
            echo "✅ 找到 sun PDC 驱动: $FOUND_PDC"
            echo "sun_pdc_found=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ sun PDC 未找到，但 qcom,pdc fallback 应该可用"
            echo "sun_pdc_found=false" >> $GITHUB_OUTPUT
          fi
          
          echo "--- 原生 SM8735 DTS ---"
          find linux-src/arch/arm64/boot/dts/qcom/ -name "*sm8735*" 2>/dev/null || echo "(无原生 DTS 文件)"
          
          echo "--- 内核版本 ---"
          head -3 linux-src/Makefile
          
          set -e
          echo "检查完成"

      - name: Fetch SM8735 sun drivers from OnePlusOSS ACK kernel
        if: steps.check-drivers.outputs.sun_gcc_found == 'false'
        run: |
          set -e
          echo "============================================"
          echo "SM8735 sun 驱动未在主线中找到"
          echo "从 OnePlusOSS ACK 6.6.89 拉取..."
          echo "============================================"
          
          ACK_REPO="https://github.com/OnePlusOSS/android_kernel_oneplus_sm8735"
          ACK_BRANCH="oneplus/sm8735_b_16.0.0_turbo_6"
          ACK_DIR="ack-kernel"
          
          # 1. 克隆 ACK 内核（仅 sun 驱动相关部分）
          echo "--- 克隆 ACK 内核（精简模式）---"
          git clone --depth 1 --branch "$ACK_BRANCH" --single-branch \
            "$ACK_REPO" "$ACK_DIR"
          
          # 2. 复制 sun 驱动源码到主线内核树
          echo "--- 复制 gcc-sun.c ---"
          cp "$ACK_DIR/drivers/clk/qcom/gcc-sun.c" \
             linux-src/drivers/clk/qcom/gcc-sun.c
          
          echo "--- 复制 pinctrl-sun.c ---"
          cp "$ACK_DIR/drivers/pinctrl/qcom/pinctrl-sun.c" \
             linux-src/drivers/pinctrl/qcom/pinctrl-sun.c
          
          # 3. 复制 DT binding 头文件
          echo "--- 复制 DT binding 头文件 ---"
          BINDING_SRC="$ACK_DIR/include/dt-bindings/clock"
          BINDING_DST="linux-src/include/dt-bindings/clock"
          for f in gcc-sun.h camcc-sun.h gpucc-sun.h dispcc-sun.h \
                   videocc-sun.h debugcc-sun.h evacc-sun.h \
                   tcsrcc-sun.h cambistmclkcc-sun.h; do
            if [ -f "$BINDING_SRC/$f" ]; then
              cp "$BINDING_SRC/$f" "$BINDING_DST/$f"
              echo "  ✅ $f"
            else
              echo "  ⚠️ $f 不存在（可选）"
            fi
          done
          
          # 4. 添加 Makefile 条目（clk/qcom）
          echo "--- 更新 clock Makefile ---"
          CLK_MK="linux-src/drivers/clk/qcom/Makefile"
          echo "" >> "$CLK_MK"
          echo "# SM8735 (Sun) drivers - ported from ACK 6.6.89" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_GCC_SUN) += gcc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_GPUCC_SUN) += gpucc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_DISPCC_SUN) += dispcc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_CAMCC_SUN) += camcc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_VIDEOCC_SUN) += videocc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_DEBUGCC_SUN) += debugcc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_EVACC_SUN) += evacc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_TCSRCC_SUN) += tcsrcc-sun.o" >> "$CLK_MK"
          echo "obj-\$(CONFIG_SM_CAMBISTMCLKCC_SUN) += cambistmclkcc-sun.o" >> "$CLK_MK"
          
          # 5. 添加 Kconfig 条目（clk/qcom）
          echo "--- 更新 clock Kconfig ---"
          CLK_KCONFIG="linux-src/drivers/clk/qcom/Kconfig"
          cat >> "$CLK_KCONFIG" << 'KCONFIG_EOF'
          
          config SM_GCC_SUN
            tristate "Sun (SM8735) Global Clock Controller"
            depends on COMMON_CLK_QCOM
            help
              Support for the global clock controller on SM8735 (Sun) devices.
              Say Y if you want to use peripheral devices such as UART, SPI, I2C,
              USB, SD/UFS, PCIe etc.
          
          config SM_GPUCC_SUN
            tristate "Sun (SM8735) Graphics Clock Controller"
            depends on SM_GCC_SUN
            help
              Support for the graphics clock controller on SM8735 (Sun) devices.
          
          config SM_DISPCC_SUN
            tristate "Sun (SM8735) Display Clock Controller"
            depends on SM_GCC_SUN
            help
              Support for the display clock controller on SM8735 (Sun) devices.
          
          config SM_CAMCC_SUN
            tristate "Sun (SM8735) Camera Clock Controller"
            depends on SM_GCC_SUN
            help
              Support for the camera clock controller on SM8735 (Sun) devices.
          
          config SM_VIDEOCC_SUN
            tristate "Sun (SM8735) Video Clock Controller"
            depends on SM_GCC_SUN
            help
              Support for the video clock controller on SM8735 (Sun) devices.
          
          config SM_DEBUGCC_SUN
            tristate "Sun (SM8735) Debug Clock Controller"
            depends on COMMON_CLK_QCOM
            help
              Support for the debug clock controller on SM8735 (Sun) devices.
          
          config SM_EVACC_SUN
            tristate "Sun (SM8735) EVA Clock Controller"
            depends on SM_GCC_SUN
            help
              Support for the EVA clock controller on SM8735 (Sun) devices.
          
          config SM_TCSRCC_SUN
            tristate "Sun (SM8735) TCSR Clock Controller"
            depends on COMMON_CLK_QCOM
            help
              Support for the TCSR clock controller on SM8735 (Sun) devices.
          
          config SM_CAMBISTMCLKCC_SUN
            tristate "Sun (SM8735) CAMBISTMCLK Clock Controller"
            depends on SM_GCC_SUN
            help
              Support for the CAMBISTMCLK clock controller on SM8735 (Sun) devices.
          KCONFIG_EOF
          
          # 6. 添加 pinctrl-sun Kconfig 条目
          echo "--- 更新 pinctrl Kconfig ---"
          PINCTRL_KCONFIG="linux-src/drivers/pinctrl/qcom/Kconfig.msm"
          # 检查 Kconfig.msm 是否存在，否则用 Kconfig
          if [ ! -f "$PINCTRL_KCONFIG" ]; then
            PINCTRL_KCONFIG="linux-src/drivers/pinctrl/qcom/Kconfig"
          fi
          cat >> "$PINCTRL_KCONFIG" << 'PCONFIG_EOF'
          
          config PINCTRL_SUN
            tristate "Qualcomm Technologies, Inc. SUN (SM8735) pin controller driver"
            depends on GPIOLIB && OF
            help
              This is the pinctrl, pinmux, pinconf and gpiolib driver for the
              Qualcomm Technologies Inc Top Level Mode Multiplexer block (TLMM)
              block found on the Qualcomm Technologies Inc SUN (SM8735) platform.
              Say Y here to compile statically, or M here to compile it as a
              module. If unsure, say N.
          PCONFIG_EOF
          
          # 7. 添加 pinctrl-sun Makefile 条目
          echo "--- 更新 pinctrl Makefile ---"
          PINCTRL_MK="linux-src/drivers/pinctrl/qcom/Makefile"
          echo "" >> "$PINCTRL_MK"
          echo "# SM8735 (Sun) - ported from ACK 6.6.89" >> "$PINCTRL_MK"
          echo "obj-\$(CONFIG_PINCTRL_SUN) += pinctrl-sun.o" >> "$PINCTRL_MK"
          
          echo ""
          echo "============================================"
          echo "✅ sun 驱动文件已部署到主线内核树"
          echo "============================================"
          echo ""
          echo "文件清单："
          echo "  drivers/clk/qcom/gcc-sun.c"
          echo "  drivers/pinctrl/qcom/pinctrl-sun.c"
          echo "  include/dt-bindings/clock/qcom,gcc-sun.h + 其他"
          echo ""
          echo "⚠️ 注意：ACK 6.6.89 驱动可能不兼容 Linux 7.1.1 API，"
          echo "   编译错误是预期的，下一步根据错误修复。"

      - name: Configure kernel
        run: |
          cd linux-src
          
          # 从 defconfig 开始
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          
          # 启用核心 Qualcomm 驱动
          ./scripts/config \
            --enable ARCH_QCOM \
            --enable QCOM_SCM \
            --enable SERIAL_QCOM_GENI \
            --enable SERIAL_QCOM_GENI_CONSOLE \
            --enable QCOM_PDC \
            --enable QCOM_RPMH \
            --enable QCOM_RPMHPD \
            --enable QCOM_CLK_RPMH \
            --enable QCOM_PMIC_GLINK \
            --enable QCOM_SMEM \
            --enable QCOM_SMD_RPM \
            --enable INTERCONNECT_QCOM \
            --enable INTERCONNECT_QCOM_BCM_VOTER \
            --enable INTERCONNECT_QCOM_SMD_RPM
          
          # 启用存储驱动
          ./scripts/config \
            --enable MMC \
            --enable SCSI_UFSHCD \
            --enable SCSI_UFS_QCOM \
            --enable PHY_QCOM_UFS \
            --enable PHY_QCOM_QMP

          # 启用 USB 驱动
          ./scripts/config \
            --enable USB \
            --enable USB_XHCI_HCD \
            --enable USB_DWC3 \
            --enable USB_DWC3_QCOM \
            --enable TYPEC \
            --enable TYPEC_TCPM \
            --enable TYPEC_TCPCI

          # 启用 SM8650 系列驱动（作为 SM8735 的最接近替代，用于测试）
          ./scripts/config \
            --enable PINCTRL_SM8650 \
            --enable SM_GCC_8650 \
            --enable INTERCONNECT_QCOM_SM8650 \
            --enable SM_GPUCC_8650 \
            --enable SM_CAMCC_8650 \
            --enable SM_TCSRCC_8650
          
          # 如果 sun 驱动可用（从 ACK 拉取），则启用
          if grep -q "CONFIG_SM_GCC_SUN" Kconfig 2>/dev/null || [ -f "drivers/clk/qcom/gcc-sun.c" ]; then
            ./scripts/config \
              --enable SM_GCC_SUN \
              --enable PINCTRL_SUN
            echo "✅ SM8735 sun 驱动已启用"
          else
            echo "ℹ️ sun 驱动不可用，使用 SM8650 fallback"
          fi
          
          # 启用其他关键功能
          ./scripts/config \
            --enable EXT4_FS \
            --enable VFAT_FS \
            --enable PROC_FS \
            --enable SYSFS \
            --enable TMPFS \
            --enable DEVTMPFS \
            --enable DEVTMPFS_MOUNT \
            --enable BLK_DEV_INITRD \
            --enable RD_GZIP \
            --enable PRINTK \
            --enable OF \
            --enable OF_OVERLAY

          # 汇总配置
          echo "=== 配置摘要 ==="
          grep -E "^(CONFIG_ARCH_QCOM|CONFIG_SM_GCC|CONFIG_PINCTRL_SM|CONFIG_QCOM_PDC|CONFIG_SERIAL_QCOM_GENI)=" .config
          
          cd ..

      - name: Build DTB
        run: |
          make -C linux-src \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            dtbs -j$(nproc) 2>&1 | tee dtb-build.log
          
          echo "=== DTB 编译结果 ==="
          ls -la linux-src/arch/arm64/boot/dts/qcom/sm8735*.dtb 2>/dev/null || echo "❌ DTB 未生成"

      - name: Build kernel Image
        run: |
          make -C linux-src \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            Image -j$(nproc) 2>&1 | tee kernel-build.log
          
          echo "=== 内核编译结果 ==="
          ls -la linux-src/arch/arm64/boot/Image 2>/dev/null || echo "❌ 内核未编译成功"

      - name: Create boot.img (optional)
        if: github.event_name == 'workflow_dispatch'
        run: |
          # 创建最小 initramfs
          mkdir -p initramfs
          cd initramfs
          cat > init << 'SCRIPT'
          #!/bin/sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          echo "OnePlus Turbo 6 - Mainline Linux 7.1"
          echo "Boot successful!"
          exec /bin/sh
          SCRIPT
          chmod +x init
          find . | cpio -H newc -o | gzip > ../initramfs.cpio.gz
          cd ..
          
          sudo apt-get install -y -qq mkbootimg 2>/dev/null || true
          
          # 检查是否有 mkbootimg
          if command -v mkbootimg &> /dev/null; then
            IMG="linux-src/arch/arm64/boot/Image.gz"
            DTB="linux-src/arch/arm64/boot/dts/qcom/sm8735-oneplus-turbo6.dtb"
            if [ -f "$IMG" ] && [ -f "$DTB" ]; then
              mkbootimg \
                --kernel "$IMG" \
                --dtb "$DTB" \
                --ramdisk initramfs.cpio.gz \
                --cmdline "console=ttyMSM0,115200n8 earlycon root=/dev/ram0" \
                --base 0x80000000 \
                --pagesize 4096 \
                --header_version 4 \
                -o boot.img
              echo "✅ boot.img 已生成"
              ls -la boot.img
            else
              echo "⚠️ 缺少内核或 DTB，跳过 boot.img 创建"
            fi
          else
            echo "⚠️ mkbootimg 不可用，跳过 boot.img 创建"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ steps.kernel-tag.outputs.tag }}
          path: |
            linux-src/arch/arm64/boot/Image
            linux-src/arch/arm64/boot/Image.gz
            linux-src/arch/arm64/boot/dts/qcom/sm8735*.dtb
            boot.img
            dtb-build.log
            kernel-build.log
          retention-days: 30
          if-no-files-found: warn
